<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Achievement Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            line-height: 1.6;
        }

        h1, h2, h3 {
            font-family: 'Press Start 2P', monospace;
            text-transform: uppercase;
        }

        /* Layout */
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #333;
        }

        header h1 {
            font-size: 1.5rem;
            color: #55FF55; /* Minecraft Green */
            text-shadow: 2px 2px 0 #000;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        .panel {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            min-width: 300px;
        }

        /* Form Controls */
        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #aaa;
            font-size: 0.9rem;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 2px solid #444;
            color: #fff;
            border-radius: 4px;
            font-family: inherit;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #55FF55;
        }

        input[type="file"] {
            width: 100%;
            padding: 5px;
            background-color: #2a2a2a;
            border: 2px solid #444;
            color: #fff;
            border-radius: 4px;
        }

        input[type="color"] {
            width: 50px;
            height: 40px;
            padding: 0;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #55FF55;
            color: #000;
            border: none;
            border-bottom: 4px solid #22aa22;
            font-family: 'Press Start 2P', monospace;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.1s;
        }

        .btn:active {
            border-bottom: 0;
            transform: translateY(4px);
        }

        /* Achievement Preview Card Styles */
        .preview-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            background-color: #000;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .achievement-card {
            display: flex;
            align-items: center;
            background-color: #212121; /* Default Dark */
            border: 4px solid #555555;
            padding: 15px;
            min-width: 350px;
            max-width: 100%;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            overflow: hidden; /* Keep canvas drawing inside borders */
            /* Animation */
            animation: slideDownFade 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #themeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0; /* Behind the text and icon */
        }

        @keyframes slideDownFade {
            0% {
                opacity: 0;
                transform: translateY(-40px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .ach-icon-container {
            margin-right: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2; /* Above the canvas background */
        }

        .ach-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            image-rendering: pixelated; /* Keeps pixel art sharp */
        }

        .ach-text {
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 2; /* Above the canvas background */
        }

        .ach-title {
            color: #FFFF55; /* Minecraft Yellow */
            font-size: 12px;
            line-height: 1.2;
            text-shadow: 2px 2px 0 #000;
        }

        .ach-desc {
            color: #FFFFFF;
            font-size: 10px;
            line-height: 1.4;
            text-shadow: 2px 2px 0 #000;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Minecraft Achievement Generator</h1>
    </header>

    <div class="main-container">
        <div class="panel">
            <h2 style="font-size: 1rem; margin-bottom: 20px; color: #fff;">Settings</h2>
            
            <div class="control-group">
                <label for="iconInput">Icon / Logo Image</label>
                <input type="file" id="iconInput" accept="image/*">
            </div>

            <div class="control-group">
                <label for="titleInput">Achievement Title</label>
                <input type="text" id="titleInput" value="Achievement Get!" placeholder="Enter title...">
            </div>

            <div class="control-group">
                <label for="descInput">Description</label>
                <input type="text" id="descInput" value="Taking Inventory" placeholder="Enter description...">
            </div>

            <div class="control-group">
                <label for="bgStyle">Biome / Theme</label>
                <select id="bgStyle">
                    <option value="classic">Classic Overworld</option>
                    <option value="nature">Overgrown Nature (Vines)</option>
                    <option value="ocean">Deep Ocean (Bubbles & Kelp)</option>
                    <option value="nether">Nether Depths (Lava Embers)</option>
                    <option value="end">The End (Void Particles)</option>
                    <option value="redstone">Redstone Circuitry</option>
                </select>
            </div>

            <div class="control-group">
                <label for="titleColor">Title Text Color</label>
                <input type="color" id="titleColor" value="#FFFF55">
            </div>

            <div class="control-group">
                <label for="iconSize">Icon Size: <span id="iconSizeDisplay">48</span>px</label>
                <input type="range" id="iconSize" min="32" max="96" value="48">
            </div>

            <button class="btn" id="downloadBtn">Download PNG</button>
        </div>

        <div class="panel">
            <h2 style="font-size: 1rem; margin-bottom: 20px; color: #fff;">Live Preview</h2>
            <div class="preview-wrapper" id="previewWrapper">
                <div class="achievement-card" id="achievementCard">
                    <!-- Added Canvas for animated/painted backgrounds like Vines -->
                    <canvas id="themeCanvas"></canvas>
                    
                    <div class="ach-icon-container">
                        <img src="" alt="Icon" class="ach-icon" id="previewIcon">
                    </div>
                    <div class="ach-text">
                        <div class="ach-title" id="previewTitle">Achievement Get!</div>
                        <div class="ach-desc" id="previewDesc">Taking Inventory</div>
                    </div>
                </div>
            </div>
            <p style="text-align: center; margin-top: 15px; color: #888; font-size: 0.8rem;">
                *Animations trigger on input changes to simulate the game feel.
            </p>
        </div>
    </div>

    <footer>
        Minecraft Achievement Generator &copy; 2026. Not affiliated with Mojang or Microsoft.
    </footer>

    <script>
        // DOM Elements
        const titleInput = document.getElementById('titleInput');
        const descInput = document.getElementById('descInput');
        const iconInput = document.getElementById('iconInput');
        const bgStyle = document.getElementById('bgStyle');
        const titleColor = document.getElementById('titleColor');
        const iconSize = document.getElementById('iconSize');
        const iconSizeDisplay = document.getElementById('iconSizeDisplay');
        const downloadBtn = document.getElementById('downloadBtn');

        const previewTitle = document.getElementById('previewTitle');
        const previewDesc = document.getElementById('previewDesc');
        const previewIcon = document.getElementById('previewIcon');
        const achievementCard = document.getElementById('achievementCard');
        const themeCanvas = document.getElementById('themeCanvas');
        const themeCtx = themeCanvas.getContext('2d');

        // State variables
        let currentImageObj = new Image();

        // --- THEME CONFIGURATION & DRAWING LOGIC ---
        const THEMES = {
            classic: { 
                bg: '#212121', border: '#555555',
                draw: null // No extra decoration
            },
            nature: { 
                bg: '#182e18', border: '#2d5a2d',
                draw: (ctx, w, h) => {
                    ctx.fillStyle = '#224a22'; // Vines base
                    // Draw Vines from top
                    const vines = [
                        {x: 0.05, len: 0.4}, {x: 0.18, len: 0.25},
                        {x: 0.32, len: 0.55}, {x: 0.45, len: 0.2},
                        {x: 0.6, len: 0.5}, {x: 0.75, len: 0.3},
                        {x: 0.9, len: 0.45}
                    ];
                    vines.forEach(v => {
                        const vx = v.x * w;
                        const vlen = v.len * h;
                        ctx.fillRect(vx, 0, 8, vlen); // Stem
                        // Leaves (Pixelated)
                        ctx.fillRect(vx - 4, vlen * 0.3, 4, 4);
                        ctx.fillRect(vx + 8, vlen * 0.6, 4, 4);
                        ctx.fillRect(vx - 4, vlen * 0.8, 4, 4);
                    });
                    // Draw Moss at bottom
                    ctx.fillStyle = '#1e381e';
                    ctx.fillRect(0, h - 8, w, 8);
                    ctx.fillRect(w * 0.15, h - 12, 16, 4);
                    ctx.fillRect(w * 0.65, h - 16, 24, 8);
                }
            },
            ocean: { 
                bg: '#001a33', border: '#004080',
                draw: (ctx, w, h) => {
                    // Bubbles
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    const bubbles = [
                        {x: 0.1, y: 0.8, r: 3}, {x: 0.2, y: 0.4, r: 2},
                        {x: 0.35, y: 0.6, r: 4}, {x: 0.5, y: 0.2, r: 2},
                        {x: 0.7, y: 0.5, r: 5}, {x: 0.85, y: 0.75, r: 3},
                        {x: 0.95, y: 0.3, r: 2}
                    ];
                    bubbles.forEach(b => {
                        ctx.beginPath();
                        ctx.arc(b.x * w, b.y * h, b.r, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    // Kelp
                    ctx.fillStyle = '#005522';
                    ctx.fillRect(w * 0.08, h * 0.5, 6, h * 0.5);
                    ctx.fillRect(w * 0.9, h * 0.4, 6, h * 0.6);
                }
            },
            nether: { 
                bg: '#290000', border: '#700000',
                draw: (ctx, w, h) => {
                    // Lava floor
                    ctx.fillStyle = '#ff4500';
                    ctx.fillRect(0, h - 6, w, 6);
                    ctx.fillStyle = '#ffa500';
                    ctx.fillRect(w*0.1, h - 6, 20, 2);
                    ctx.fillRect(w*0.6, h - 6, 30, 2);
                    // Floating Embers
                    const embers = [
                        {x: 0.15, y: 0.8, c: '#ff4500'}, {x: 0.25, y: 0.5, c: '#ffa500'},
                        {x: 0.4, y: 0.7, c: '#ff4500'}, {x: 0.6, y: 0.3, c: '#ff0000'},
                        {x: 0.8, y: 0.6, c: '#ffa500'}, {x: 0.9, y: 0.4, c: '#ff4500'}
                    ];
                    embers.forEach(e => {
                        ctx.fillStyle = e.c;
                        ctx.fillRect(e.x * w, e.y * h, 4, 4);
                    });
                }
            },
            end: { 
                bg: '#14001f', border: '#3d005c',
                draw: (ctx, w, h) => {
                    // Void Stars / Enderman particles
                    const particles = [
                        {x: 0.1, y: 0.2}, {x: 0.3, y: 0.8}, {x: 0.5, y: 0.4},
                        {x: 0.7, y: 0.9}, {x: 0.85, y: 0.3}, {x: 0.95, y: 0.7}
                    ];
                    particles.forEach(p => {
                        ctx.fillStyle = '#aa00ff';
                        ctx.fillRect(p.x * w, p.y * h, 4, 4);
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(p.x * w + 1, p.y * h + 1, 2, 2);
                    });
                    // Obsidian Pillars fading
                    ctx.fillStyle = '#0f001a';
                    ctx.fillRect(w * 0.15, 0, 16, h);
                    ctx.fillRect(w * 0.8, 0, 20, h);
                }
            },
            redstone: { 
                bg: '#222222', border: '#8b0000',
                draw: (ctx, w, h) => {
                    // Circuit lines
                    ctx.strokeStyle = '#8b0000';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    // Left circuit
                    ctx.moveTo(0, h * 0.3);
                    ctx.lineTo(w * 0.15, h * 0.3);
                    ctx.lineTo(w * 0.15, h * 0.7);
                    ctx.lineTo(w * 0.25, h * 0.7);
                    // Right circuit
                    ctx.moveTo(w, h * 0.8);
                    ctx.lineTo(w * 0.85, h * 0.8);
                    ctx.lineTo(w * 0.85, h * 0.2);
                    ctx.lineTo(w * 0.75, h * 0.2);
                    ctx.stroke();

                    // Active Redstone Dust
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(w * 0.25, h * 0.7 - 2, 8, 8);
                    ctx.fillRect(w * 0.75 - 8, h * 0.2 - 2, 8, 8);
                    
                    // Glow effect
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.15)';
                    ctx.fillRect(w * 0.25 - 4, h * 0.7 - 6, 16, 16);
                    ctx.fillRect(w * 0.75 - 12, h * 0.2 - 6, 16, 16);
                }
            }
        };

        // 1. Generate a default "Grass Block" icon
        function createDefaultIcon() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            // Dirt base
            ctx.fillStyle = '#866043';
            ctx.fillRect(0, 0, 64, 64);
            // Grass top
            ctx.fillStyle = '#557A2B';
            ctx.fillRect(0, 0, 64, 24);
            // Little grass details
            ctx.fillRect(0, 24, 16, 8);
            ctx.fillRect(24, 24, 8, 12);
            ctx.fillRect(48, 24, 16, 8);

            return canvas.toDataURL('image/png');
        }

        // Initialize default icon
        const defaultIconData = createDefaultIcon();
        previewIcon.src = defaultIconData;
        currentImageObj.src = defaultIconData;

        // 2. Re-trigger Animation helper
        function triggerAnimation() {
            achievementCard.style.animation = 'none';
            achievementCard.offsetHeight; // Trigger reflow
            achievementCard.style.animation = 'slideDownFade 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
        }

        // 3. Render Background & Decals to Canvas
        function renderThemeCanvas(canvasEl, ctx, width, height, themeId) {
            const theme = THEMES[themeId] || THEMES['classic'];
            
            // Set exact dimensions
            canvasEl.width = width;
            canvasEl.height = height;

            // Clear previous
            ctx.clearRect(0, 0, width, height);

            // Draw base background
            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, width, height);

            // Draw Custom Theme Decorations (Vines, Bubbles, etc)
            if (theme.draw) {
                theme.draw(ctx, width, height);
            }
        }

        // 4. Update Preview DOM elements
        function updatePreview() {
            // Text updates
            previewTitle.textContent = titleInput.value || ' ';
            previewDesc.textContent = descInput.value || ' ';
            
            // Color updates
            previewTitle.style.color = titleColor.value;
            
            // Background & Border Theme updates
            const selectedTheme = THEMES[bgStyle.value] || THEMES['classic'];
            achievementCard.style.backgroundColor = selectedTheme.bg;
            achievementCard.style.borderColor = selectedTheme.border;

            // Update Background Canvas Decorations
            const cardRect = achievementCard.getBoundingClientRect();
            // We draw the theme canvas to match the card's inner size
            renderThemeCanvas(themeCanvas, themeCtx, cardRect.width, cardRect.height, bgStyle.value);

            // Icon size update
            const size = iconSize.value + 'px';
            previewIcon.style.width = size;
            previewIcon.style.height = size;
            iconSizeDisplay.textContent = iconSize.value;
        }

        // 5. Handle Event Listeners
        titleInput.addEventListener('input', updatePreview);
        descInput.addEventListener('input', updatePreview);
        titleColor.addEventListener('input', updatePreview);
        
        bgStyle.addEventListener('change', () => {
            updatePreview();
            triggerAnimation();
        });

        iconSize.addEventListener('input', updatePreview);

        // Responsive Resize Observer to keep canvas sharp
        const resizeObserver = new ResizeObserver(() => updatePreview());
        resizeObserver.observe(achievementCard);

        // Handle Image Upload
        iconInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewIcon.src = event.target.result;
                    currentImageObj.src = event.target.result;
                    triggerAnimation();
                };
                reader.readAsDataURL(file);
            }
        });

        // 6. Generate and Download Final PNG
        downloadBtn.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Wait for font to be ready
            document.fonts.ready.then(() => {
                const cardRect = achievementCard.getBoundingClientRect();
                
                canvas.width = cardRect.width;
                canvas.height = cardRect.height;

                const selectedTheme = THEMES[bgStyle.value];

                // 1. Draw Background & Decorations directly into download canvas
                renderThemeCanvas(canvas, ctx, canvas.width, canvas.height, bgStyle.value);

                // 2. Draw the Thick Border On Top
                ctx.strokeStyle = selectedTheme.border;
                ctx.lineWidth = 8; // 4px border * 2 because stroke is centered on the edge
                ctx.strokeRect(0, 0, canvas.width, canvas.height);

                // 3. Draw Icon
                const size = parseInt(iconSize.value);
                const padding = 15;
                const iconY = (canvas.height - size) / 2;
                ctx.imageSmoothingEnabled = false; // Pixel art aesthetic
                ctx.drawImage(currentImageObj, padding, iconY, size, size);

                // 4. Draw Text
                const textStartX = padding + size + 20;
                ctx.textBaseline = 'top';

                // Title Text
                ctx.font = "12px 'Press Start 2P', monospace";
                ctx.fillStyle = '#000000'; // Text shadow
                ctx.fillText(titleInput.value || ' ', textStartX + 2, padding + 2);
                ctx.fillStyle = titleColor.value; // Real color
                ctx.fillText(titleInput.value || ' ', textStartX, padding);

                // Description Text
                ctx.font = "10px 'Press Start 2P', monospace";
                ctx.fillStyle = '#000000'; // Text shadow
                const descY = padding + 20; 
                ctx.fillText(descInput.value || ' ', textStartX + 2, descY + 2);
                ctx.fillStyle = '#FFFFFF'; // Real color
                ctx.fillText(descInput.value || ' ', textStartX, descY);

                // 5. Trigger Download
                const link = document.createElement('a');
                link.download = `achievement_${bgStyle.value}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });

        // Initial setup
        updatePreview();
    </script>
</body>
</html>
